# Development-only etcd used by the e2e suite to back the OtelDBCluster ring coordination.
# Mirrors operator/config/samples/etcd-dev.yaml: single replica, emptyDir (data lost on restart),
# no TLS. The operator intentionally does not manage etcd; the e2e suite brings its own here and
# points spec.etcd.endpoints at it. NOT production-grade.
---
apiVersion: v1
kind: Service
metadata:
  name: etcd
  labels:
    app: etcd
spec:
  clusterIP: None
  selector:
    app: etcd
  ports:
    - name: client
      port: 2379
    - name: peer
      port: 2380
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: etcd
spec:
  serviceName: etcd
  replicas: 1
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.17
          command:
            - /usr/local/bin/etcd
            - --name=etcd-0
            - --data-dir=/var/run/etcd
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://etcd-0.etcd:2379
            - --listen-peer-urls=http://0.0.0.0:2380
            - --initial-advertise-peer-urls=http://etcd-0.etcd:2380
            - --initial-cluster=etcd-0=http://etcd-0.etcd:2380
            - --initial-cluster-state=new
          ports:
            - { containerPort: 2379, name: client }
            - { containerPort: 2380, name: peer }
          readinessProbe:
            httpGet:
              path: /health
              port: 2379
            initialDelaySeconds: 2
            periodSeconds: 2
          volumeMounts:
            - name: data
              mountPath: /var/run/etcd
      volumes:
        - name: data
          emptyDir: {}
